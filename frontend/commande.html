<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Commande - Dolce Pizza</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📦 Passez votre commande 📦</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <h2>Commander une pizza 🍕</h2>

    <form id="commandeForm">

        <label>Pizza :</label>
        <select id="pizza" name="produit">
            <option value="Margherita">Pizza Margherita</option>
            <option value="Quatre saisons">Pizza Quatre Saisons</option>
            <option value="Pepperoni">Pizza Pepperoni</option>
        </select>

        <label>Quantité :</label>
        <input type="number" name="quantite" min="1" value="1" required>

        <!-- 💰 TOTAL -->
        <p><strong>Total :</strong> <span id="total">0</span> DH</p>

        <h3>Informations client</h3>

        <input type="text" name="nomClient" placeholder="Nom complet" required>
        <input type="text" name="adresse" placeholder="Adresse" required>
        <input type="tel" name="telephone" placeholder="Téléphone" required>

        <button type="submit">Commander 🍕</button>

    </form>
</main>

<footer>
    &copy; 2025 Dolce Pizza
</footer>

<script>
const prix = {
    "Margherita": 45,
    "Pepperoni": 55,
    "Quatre saisons": 60
};

// AUTO LOAD
window.onload = function() {
    const pizza = localStorage.getItem("pizzaChoisie");
    if (pizza) {
        document.getElementById("pizza").value = pizza;
    }
    calculerTotal();
};

// CALCUL TOTAL
function calculerTotal() {
    const pizza = document.getElementById("pizza").value;
    const quantite = document.querySelector("input[name='quantite']").value;

    const total = prix[pizza] * quantite;
    document.getElementById("total").textContent = total || 0;
}

// EVENTS
document.getElementById("pizza").addEventListener("change", calculerTotal);
document.querySelector("input[name='quantite']").addEventListener("input", calculerTotal);

// ENVOI BACKEND
document.getElementById("commandeForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = e.target;

    fetch("http://localhost:8080/api/commandes", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nomClient: form.nomClient.value,
            produit: form.produit.value,
            quantite: form.quantite.value,
            adresse: form.adresse.value,
            telephone: form.telephone.value
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("✅ Commande envoyée !");
        localStorage.removeItem("pizzaChoisie");
        window.location.href = "confirmation commande.html";
    })
    .catch(err => {
        alert("❌ Erreur serveur");
        console.error(err);
    });
});
</script>
<script src="script.js"></script>
</body>
</html>
