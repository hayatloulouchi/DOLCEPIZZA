<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Menu - Dolce Pizza</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🍕 Notre Menu 🍕</h1>
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    <section id="menu">

        <!-- MARGHERITA -->
        <div class="pizza">
            <img src="images/margherita.jpg" alt="Pizza Margherita">
            <h3>Pizza Margherita</h3>
            <p>Tomate, mozzarella, basilic</p>
            <p class="price">45 DH</p>
            <button onclick="commander('Margherita')">Commander 🍕</button>
        </div>

        <!-- PEPPERONI -->
        <div class="pizza">
            <img src="images/pepperoni.jpg" alt="Pizza Pepperoni">
            <h3>Pizza Pepperoni</h3>
            <p>Tomate, mozzarella, pepperoni</p>
            <p class="price">55 DH</p>
            <button onclick="commander('Pepperoni')">Commander 🍕</button>
        </div>

        <!-- QUATTRO -->
        <div class="pizza">
            <img src="images/quatre-saisons.jpg" alt="Pizza Quatre Saisons">
            <h3>Pizza Quatre Saisons</h3>
            <p>Champignons, jambon, olives</p>
            <p class="price">60 DH</p>
            <button onclick="commander('Quatre saisons')">Commander 🍕</button>
        </div>

    </section>
</main>

<footer>
    &copy; 2025 Dolce Pizza - Tous droits réservés
</footer>

<!-- SCRIPT -->
<script>
function commander(pizza) {
    localStorage.setItem("pizzaChoisie", pizza);
    window.location.href = "commande.html";
}
</script>

</body>
</html>
